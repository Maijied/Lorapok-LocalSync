name: Build Software and Deploy Website

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-all:
    name: Build Lorapok LocalSync
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
    
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: frontend/package.json

      - name: Install Dependencies
        run: |
          cd frontend
          npm install

      - name: Build Desktop Apps
        run: |
          cd frontend
          npm run electron:build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Desktop Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.os }}
          path: frontend/dist-electron/*.{exe,dmg,AppImage}

  build-android:
    name: Build Android App
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Build Android APK
        run: |
          cd frontend
          npm install
          npm run build
          # Add android platform if missing
          if [ ! -d "android" ]; then
            npx cap add android
          fi
          npx cap sync android
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload Android Artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: frontend/android/app/build/outputs/apk/debug/app-debug.apk

  release-and-deploy:
    name: Release Software & Deploy Website
    runs-on: ubuntu-latest
    needs: [build-all, build-android]
    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Download Artifacts
        uses: actions/download-artifact@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Web Build
        run: |
          cd frontend
          npm install
          npm run build

      - name: Inject Direct Download Links
        run: |
          # Get version from package.json
          VERSION=$(node -p "require('./frontend/package.json').version")
          
          # If this is a tag push, use the tag name. Otherwise use 'latest' or the version
          TAG_NAME="${{ github.ref_type == 'tag' && github.ref_name || 'latest' }}"
          
          # Fallback if no tag: we will use the version from package.json in the links
          # Note: filenames in package.json are Lorapok-LocalSync-Setup-${version}.exe
          
          BASE_URL="https://github.com/${{ github.repository }}/releases/download/$TAG_NAME"
          
          # Replace placeholders in the main landing page
          sed -i "s|\[\[WIN_LINK\]\]|$BASE_URL/Lorapok-LocalSync-Setup-$VERSION.exe|g" index.html
          sed -i "s|\[\[MAC_LINK\]\]|$BASE_URL/Lorapok-LocalSync-$VERSION.dmg|g" index.html
          sed -i "s|\[\[LINUX_LINK\]\]|$BASE_URL/Lorapok-LocalSync-$VERSION.AppImage|g" index.html
          sed -i "s|\[\[APK_LINK\]\]|$BASE_URL/app-debug.apk|g" index.html
          
          # Copy landing page to distribution folder
          cp index.html style.css logo.svg frontend/dist/

      - name: Create or Update Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_type == 'tag' && github.ref_name || 'latest' }}
          name: Lorapok LocalSync ${{ github.ref_type == 'tag' && github.ref_name || 'Latest Build' }}
          draft: false
          prerelease: false
          files: |
            desktop-windows-latest/*.exe
            desktop-macos-latest/*.dmg
            desktop-ubuntu-latest/*.AppImage
            android-apk/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: frontend/dist
          publish_branch: gh-pages
