name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-desktop:
    name: Build Desktop (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]

    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'
          cache-dependency-path: frontend/package.json

      - name: Install Dependencies
        run: |
          cd frontend
          npm install

      - name: Build Web
        run: |
          cd frontend
          npm run build

      - name: Build Electron
        run: |
          cd frontend
          npm run electron:build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-builds-${{ matrix.os }}
          path: frontend/dist-electron/*.{exe,dmg,AppImage,zip}

  build-android:
    name: Build Android
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'
          cache-dependency-path: frontend/package.json

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install Dependencies
        run: |
          cd frontend
          npm install

      - name: Build Web
        run: |
          cd frontend
          npm run build

      - name: Capacitor Sync
        run: |
          cd frontend
          npx cap sync android

      - name: Build Android APK
        run: |
          cd frontend/android
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: frontend/android/app/build/outputs/apk/debug/app-debug.apk

  deploy-pages:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: [build-desktop, build-android]
    permissions:
      contents: write
      pages: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Dependencies
        run: |
          cd frontend
          npm install

      - name: Build Web
        run: |
          cd frontend
          npm run build

      - name: Copy index.html to dist
        run: cp index.html frontend/dist/

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: frontend/dist
          publish_branch: gh-pages

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-desktop, build-android]
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            desktop-builds-windows-latest/*.exe
            desktop-builds-macos-latest/*.dmg
            desktop-builds-ubuntu-latest/*.AppImage
            android-apk/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
