name: Build Software and Deploy Website

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-all:
    name: Build Lorapok LocalSync
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
    
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: frontend/package.json

      - name: Install Linux Build Dependencies
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y fakeroot dpkg

      - name: Install Dependencies
        run: |
          cd frontend
          npm ci

      - name: Build Desktop Apps
        shell: bash
        run: |
          cd frontend
          case "${{ matrix.os }}" in
            "windows-latest") TARGET="--win" ;;
            "macos-latest")   TARGET="--mac" ;;
            "ubuntu-latest")  TARGET="--linux" ;;
          esac
          npm run electron:build -- $TARGET
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: List Build Output
        shell: bash
        run: |
          ls -R frontend/dist-electron || echo "No dist-electron folder found"

      - name: Upload Desktop Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.os }}
          path: frontend/dist-electron/

  build-android:
    name: Build Android App
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: frontend/package.json

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Build Android APK
        run: |
          cd frontend
          npm ci
          npm run build
          if [ ! -d "android" ]; then
            npx cap add android
          fi
          npx cap sync android
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload Android Artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: frontend/android/app/build/outputs/apk/debug/app-debug.apk

  release-and-deploy:
    name: Release Software & Deploy Website
    runs-on: ubuntu-latest
    needs: [build-all, build-android]
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Download Artifacts
        uses: actions/download-artifact@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: frontend/package.json

      - name: Setup Web Build
        run: |
          cd frontend
          npm ci
          npm run build

      - name: Inject Direct Download Links
        run: |
          VERSION=$(node -p "require('./frontend/package.json').version")
          TAG_NAME="${{ github.ref_type == 'tag' && github.ref_name || 'latest' }}"
          BASE_URL="https://github.com/${{ github.repository }}/releases/download/$TAG_NAME"
          
          # Use the root files as the landing page
          # Copy them to a clean folder for deployment
          mkdir -p deploy_site
          cp index.html style.css logo.png deploy_site/
          
          # Include the built React App as a sub-app
          mkdir -p deploy_site/app
          cp -r frontend/dist/* deploy_site/app/
          
          # Perform replacements in the deploy_site folder
          sed -i "s@\[\[VERSION\]\]@$VERSION@g" deploy_site/index.html
          sed -i "s@__WIN_LINK__@$BASE_URL/Lorapok-LocalSync-Setup-$VERSION.exe@g" deploy_site/index.html
          sed -i "s@__MAC_LINK__@$BASE_URL/Lorapok-LocalSync-$VERSION.dmg@g" deploy_site/index.html
          sed -i "s@__LINUX_LINK__@$BASE_URL/Lorapok-LocalSync-$VERSION.AppImage@g" deploy_site/index.html
          sed -i "s@__DEB_LINK__@$BASE_URL/Lorapok-LocalSync-$VERSION.deb@g" deploy_site/index.html
          sed -i "s@__APK_LINK__@$BASE_URL/app-debug.apk@g" deploy_site/index.html
          
          # Debug: Verify the file was changed
          grep "github.com" deploy_site/index.html || echo "ERROR: Links not found in index.html"

      - name: Create or Update Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_type == 'tag' && github.ref_name || 'latest' }}
          name: Lorapok LocalSync ${{ github.ref_type == 'tag' && github.ref_name || 'Latest Build' }}
          draft: false
          prerelease: false
          files: |
            desktop-windows-latest/**/*.exe
            desktop-macos-latest/**/*.dmg
            desktop-ubuntu-latest/**/*.AppImage
            desktop-ubuntu-latest/**/*.deb
            android-apk/**/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: deploy_site/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
