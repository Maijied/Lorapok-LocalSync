<!DOCTYPE html>
<html>
<head>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #050510;
            color: #00f3ff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            border: 1px solid rgba(0, 243, 255, 0.3);
        }
        .logo-container {
            width: 120px;
            height: 120px;
            margin-bottom: 20px;
            animation: pulse 2s infinite ease-in-out;
        }
        .logo {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        .title {
            font-size: 24px;
            font-weight: 900;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 10px;
        }
        .status {
            font-size: 12px;
            opacity: 0.6;
            letter-spacing: 1px;
        }
        .loader {
            width: 200px;
            height: 2px;
            background: rgba(255, 255, 255, 0.1);
            margin-top: 30px;
            position: relative;
            overflow: hidden;
        }
        .loader-bar {
            width: 40%;
            height: 100%;
            background: #00f3ff;
            position: absolute;
            animation: loading 1.5s infinite linear;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); filter: drop-shadow(0 0 10px rgba(0, 243, 255, 0.4)); }
            50% { transform: scale(1.05); filter: drop-shadow(0 0 25px rgba(0, 243, 255, 0.8)); }
        }
        @keyframes loading {
            0% { left: -40%; }
            100% { left: 100%; }
        }
    </style>
</head>
<body>
    <div class="logo-container">
        <img src="logo.png" alt="Logo" class="logo">
    </div>
    <div class="title">Lorapok LocalSync</div>
    <div class="status">INITIALIZING SECURE PROTOCOLS...</div>
    <div class="loader">
        <div class="loader-bar"></div>
    </div>
</body>
</html>
